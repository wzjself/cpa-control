<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>云笔记</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div>
          <h1>云笔记</h1>
          <p>多标签笔记 + 文件同步</p>
        </div>
        <button class="mobile-toggle" id="mobileToggle">☰</button>
      </div>
      <div class="sidebar-actions">
        <button id="newTabBtn">+ 新建标签</button>
      </div>
      <div class="tab-list" id="tabList"></div>
    </aside>

    <main class="main-panel">
      <header class="topbar">
        <input id="titleInput" class="title-input" placeholder="标签标题" />
        <div class="status-wrap">
          <span id="saveStatus" class="save-status">就绪</span>
          <button id="deleteTabBtn" class="ghost danger">删除标签</button>
        </div>
      </header>

      <section class="editor-wrap">
        <div id="editor" class="editor" contenteditable="true" spellcheck="true"></div>
      </section>

      <section class="bottom-panels">
        <div class="upload-panel bottom-upload-panel">
          <h3>上传文档</h3>
          <label class="upload-button">
            <input type="file" id="docInput" multiple accept="*/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.md,.csv,.zip,.rar,.7z" />
            <span>选择文档 / 任意文件</span>
          </label>
          <p class="hint">文件会保存到服务器项目的独立文件夹里。微信内置浏览器若仍只显示图片/视频，建议点右上角后用系统浏览器打开。</p>
        </div>

        <section class="uploads-wrap">
          <div class="section-title-row">
            <h3>当前文件</h3>
            <span class="hint">可直接在编辑区粘贴图片 📎</span>
          </div>
          <input id="fileSearchInput" class="file-search-input" placeholder="搜索文件名" />
          <div id="uploadsList" class="uploads-list"></div>
        </section>
      </section>
    </main>
  </div>

  <template id="tabItemTemplate">
    <button class="tab-item" draggable="true">
      <span class="tab-title"></span>
      <span class="tab-meta">↕</span>
    </button>
  </template>

  <div id="confirmModal" class="confirm-modal hidden">
    <div class="confirm-card">
      <h3 id="confirmTitle">确认操作</h3>
      <p id="confirmMessage">你确定要继续吗？</p>
      <div class="confirm-actions">
        <button id="confirmCancelBtn" class="ghost">取消</button>
        <button id="confirmOkBtn" class="danger-solid">确认删除</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
